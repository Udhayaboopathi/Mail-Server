version: "3.8"

services:
  # ============================================================================
  # INFRASTRUCTURE SERVICES
  # ============================================================================

  postgres:
    image: postgres:16-alpine
    container_name: mail-postgres
    env_file: backend.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  valkey:
    image: valkey/valkey:unstable-alpine3.23
    container_name: mail-valkey
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "16379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: local:valkey:6379
    ports:
      - "8081:8081"
    depends_on:
      - valkey
    profiles:
      - "dev"

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    profiles:
      - "dev"

  spamassassin:
    image: instantlinux/spamassassin:latest
    container_name: mail-spamassassin
    volumes:
      - ./infra/spamassassin:/etc/spamassassin:ro
    healthcheck:
      test: ["CMD-SHELL", "spamassassin -V >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  clamav:
    image: clamav/clamav:latest
    container_name: mail-clamav
    volumes:
      - ./infra/clamav:/etc/clamav:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clamdscan --version >/dev/null 2>&1 || clamscan --version >/dev/null 2>&1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # BACKEND SERVICES
  # ============================================================================

  backend:
    build: ./backend
    container_name: mail-backend
    env_file: backend.env
    ports:
      - "25:25" # SMTP
      - "587:587" # SMTP TLS
      - "993:993" # IMAP TLS
      - "8000:8000" # API
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      spamassassin:
        condition: service_healthy
      clamav:
        condition: service_healthy
    volumes:
      - maildata:/var/mail
      - ./infra/dkim:/etc/dkim
      - ./nginx/ssl:/etc/ssl
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  celery-worker:
    build: ./backend
    container_name: mail-celery
    env_file: backend.env
    command:
      - celery
      - -A
      - tasks.celery_app:celery_app
      - worker
      - -B
      - --loglevel=info
    volumes:
      - maildata:/var/mail
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A tasks.celery_app inspect active >/dev/null 2>&1 || exit 0",
        ]
      interval: 60s
      timeout: 5s
      retries: 1
    restart: unless-stopped

  # ============================================================================
  # FRONTEND SERVICES
  # ============================================================================

  frontend:
    build: ./frontend
    container_name: mail-frontend
    env_file: frontend.env
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -f http://127.0.0.1:3000 || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # REVERSE PROXY
  # ============================================================================

  nginx:
    build: ./nginx
    container_name: mail-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || wget -qO- https://127.0.0.1/health --no-check-certificate >/dev/null 2>&1 || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # SECURITY
  # ============================================================================

  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: mail-fail2ban
    volumes:
      - ./infra/fail2ban:/data:ro
      - /var/log:/var/log:ro
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    healthcheck:
      test: ["CMD-SHELL", "fail2ban-client status >/dev/null 2>&1 || exit 0"]
      interval: 60s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  valkey_data:
  maildata:
